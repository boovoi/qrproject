<!DOCTYPE html>
<html>
<head>
    <title>Mobile Geo-Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { padding: 0; margin: 0; }
        #map { height: 300vh; width: 600vw; }
    </style>
</head>
<body>
    <div id="map"></div>

    <!-- Leaflet JS Library -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Initialize the map
        const map = L.map('map').setView([58.4074444, -122.692001], 8);

        // 2. Add a Base Map Layer (OpenStreetMap)
		L.tileLayer('http://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{
			maxZoom: 20,
			attribution: 'Google',
			subdomains:['mt0','mt1','mt2','mt3']
		}).addTo(map);

        // 3. Add Example Feature Layers
        // Layer A: A Polygon representing a Park
        var parkLayer = L.geoJSON({
            "type": "Feature",
            "properties": {"name": "Example Forest Park"},
            "geometry": {
                "type": "Polygon",
                "coordinates": [[[-122.68, 58.52], [-122.67, 58.52], [-122.67, 58.53], [-122.68, 58.53], [-122.68, 58.52]]]
            }
        }).bindPopup("<b>Example Park</b><br>Layer 1: Polygons").addTo(map);

        // Layer B: A LineString representing a Trail
        var trailLayer = L.geoJSON({
            "type": "Feature",
            "properties": {"name": "Example Hiking Trail"},
            "geometry": {
                "type": "LineString",
                "coordinates": [[-122.69, 58.51], [-122.68, 58.52], [-122.67, 58.51]]
            }
        }, {
            style: { color: "#ff7800", weight: 5 }
        }).bindPopup("<b>Example Trail</b><br>Layer 2: Lines").addTo(map);

        // 4. Layer Control (Toggle layers on/off)
        var overlays = {
            "Parks": parkLayer,
            "Trails": trailLayer
        };
        L.control.layers(null, overlays).addTo(map);

        // 5. Geolocation (Find the user on the map)
        map.locate({setView: true, maxZoom: 16});
        map.on('locationfound', function(e) {
            L.marker(e.latlng).addTo(map).bindPopup("You are here").openPopup();
        });
    </script>
</body>
</html>
